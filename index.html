<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="待办">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#667eea">
<link rel="apple-touch-icon" href="icon-180.png?v=2">
<link rel="icon" type="image/png" sizes="180x180" href="icon-180.png?v=2">
<link rel="manifest" href="manifest.json">
<title>待办事项</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #f2f2f7;
    color: #000;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }

  /* 顶部导航 */
  .navbar {
    padding: env(safe-area-inset-top, 20px) 16px 12px;
    padding-top: max(env(safe-area-inset-top), 50px);
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .navbar h1 {
    font-size: 32px;
    font-weight: 700;
  }
  .navbar .subtitle {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 2px;
  }

  /* Tab 切换 */
  .tab-bar {
    display: flex;
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
  }
  .tab-btn {
    flex: 1;
    padding: 12px;
    border: none;
    background: none;
    font-size: 16px;
    font-weight: 500;
    color: #8e8e93;
    cursor: pointer;
    -webkit-appearance: none;
    position: relative;
  }
  .tab-btn.active {
    color: #007aff;
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 40px;
    height: 3px;
    background: #007aff;
    border-radius: 2px;
  }

  /* 待办列表 */
  .todo-section {
    display: block;
  }
  .input-section {
    padding: 12px 16px;
    border-bottom: 1px solid #e5e5e5;
    background: #fff;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-row input[type="text"] {
    flex: 1;
    padding: 10px 0;
    border: none;
    font-size: 17px;
    outline: none;
    -webkit-appearance: none;
    background: transparent;
  }
  .input-row input[type="text"]::placeholder {
    color: #c7c7cc;
  }
  .input-row input[type="text"] {
    touch-action: auto;
  }
  .btn-add {
    padding: 8px 14px;
    background: #ffc107;
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-add:active { opacity: .7; }

  .list-section {
    overflow: hidden;
    background: #fff;
    margin: 12px 0;
    border-radius: 12px;
    margin-left: 12px;
    margin-right: 12px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #c7c7cc;
    font-size: 15px;
  }
  ul { list-style: none; }
  li {
    border-bottom: 1px solid #e5e5e5;
    position: relative;
    overflow: hidden;
    padding: 0 16px;
  }
  li:last-child { border-bottom: none; }

  .swipe-wrap {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    background: transparent;
    transition: transform .2s ease-out;
    touch-action: pan-y;
    position: relative;
    z-index: 2;
  }
  li .swipe-wrap {
    background: #fff;
    margin: 0 -16px;
    padding: 12px 16px;
  }
  li.done .swipe-wrap { background: #e8f5e9; }

  .swipe-actions {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    display: flex;
    z-index: 3;
    transform: translateX(100%);
    transition: transform .2s ease-out;
  }
  li.swiped .swipe-actions { transform: translateX(0); }
  .swipe-btn {
    width: 60px;
    border: none;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    -webkit-appearance: none;
  }
  .swipe-btn svg { width: 18px; height: 18px; }
  .btn-edit { background: #007aff; }
  .btn-delete { background: #ff3b30; }

  .check-btn {
    width: 22px;
    height: 22px;
    border: 2px solid #c7c7cc;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    -webkit-appearance: none;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .check-btn:active { transform: scale(.9); }
  li.done .check-btn {
    background: #34c759;
    border-color: #34c759;
  }
  li.done .check-btn::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  li.done { background: #e8f5e9; }
  li.done .swipe-wrap { background: #e8f5e9; }
  li.done .todo-text { color: #2e7d32; }

  .todo-content { flex: 1; min-width: 0; }
  .todo-text {
    font-size: 17px;
    line-height: 1.4;
    word-break: break-word;
  }

  .edit-input {
    width: 100%;
    padding: 0;
    border: none;
    font-size: 17px;
    outline: none;
    -webkit-appearance: none;
    background: transparent;
    touch-action: auto;
  }

  /* 打卡模块 */
  .checkin-section {
    display: none;
    padding: 12px;
  }
  .checkin-section.active {
    display: block;
  }
  .todo-section.active {
    display: block;
  }
  .todo-section:not(.active) {
    display: none;
  }

  /* 月份导航 */
  .month-nav {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff;
    padding: 12px 16px;
    border-radius: 12px;
    margin-bottom: 12px;
  }
  .month-nav-btn {
    width: 36px;
    height: 36px;
    border: none;
    background: #f5f5f7;
    border-radius: 50%;
    font-size: 18px;
    color: #007aff;
    cursor: pointer;
    -webkit-appearance: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .month-nav-btn:active { background: #e5e5ea; }
  .month-nav-title {
    font-size: 18px;
    font-weight: 600;
  }

  /* 打卡表格 */
  .checkin-table-wrap {
    background: #fff;
    border-radius: 12px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    position: relative;
    touch-action: pan-x pan-y;
  }
  .checkin-table {
    min-width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
  }
  .checkin-table th, .checkin-table td {
    padding: 8px 6px;
    text-align: center;
    border: 1px solid #e5e5e5;
    min-width: 36px;
  }
  .checkin-table th {
    background: #f5f5f7;
    font-weight: 500;
    color: #8e8e93;
    font-size: 11px;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .checkin-table th.task-name {
    text-align: left;
    padding-left: 12px;
    min-width: 100px;
    position: sticky;
    left: 0;
    z-index: 20;
    background: #f5f5f7;
  }
  .checkin-table td.task-name {
    text-align: left;
    padding-left: 12px;
    font-weight: 500;
    position: sticky;
    left: 0;
    z-index: 5;
    background: #fff;
  }
  .checkin-table td.task-name .task-title {
    font-weight: 500;
    line-height: 1.3;
  }
  .checkin-table td.task-name .time {
    font-size: 11px;
    color: #8e8e93;
    font-weight: normal;
    line-height: 1.3;
  }
  .checkin-table td.task-name .status-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: 6px;
  }
  .status-tag.disabled {
    background: #f5f5f7;
    color: #8e8e93;
  }
  .checkin-table td.cell {
    cursor: pointer;
    font-size: 16px;
  }
  .checkin-table td.cell.future {
    background: #f9f9f9;
    color: #c7c7cc;
  }
  .checkin-table td.cell.past {
    background: #fafafa;
  }
  .checkin-table td.cell.today {
    background: #fff8e1;
  }
  .checkin-table td.cell.checked {
    background: #e8f5e9;
  }
  .checkin-table td.cell.has-note {
    background: #fff3e0;
  }
  .checkin-table td.cell.overdue {
    background: #ffebee;
  }
  .checkin-table td.cell.disabled-task {
    background: #f5f5f5;
    color: #c7c7cc;
  }

  /* 任务管理按钮 */
  .task-manage-btn {
    position: fixed;
    right: 16px;
    bottom: calc(30px + env(safe-area-inset-bottom));
    width: 56px;
    height: 56px;
    background: #007aff;
    color: #fff;
    border: none;
    border-radius: 50%;
    font-size: 28px;
    cursor: pointer;
    -webkit-appearance: none;
    box-shadow: 0 4px 12px rgba(0,122,255,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .task-manage-btn:active { transform: scale(0.95); }

  /* 任务管理弹窗 */
  .modal-mask {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.4);
    z-index: 999;
    justify-content: center;
    align-items: flex-end;
    backdrop-filter: blur(2px);
  }
  .modal-mask.show { display: flex; }
  .modal-mask.no-pointer { pointer-events: none; }
  .modal-mask.no-pointer .modal-box { pointer-events: auto; }
  .modal-box {
    background: #fff;
    border-radius: 20px 20px 0 0;
    padding: 24px 20px calc(34px + env(safe-area-inset-bottom, 0px));
    padding-bottom: max(34px, calc(34px + env(safe-area-inset-bottom)));
    width: 100%;
    max-width: 500px;
    max-height: 80vh;
    overflow-y: auto;
    animation: slideUp .3s cubic-bezier(0.25, 0.1, 0.25, 1);
    touch-action: auto;
    position: relative;
    z-index: 10;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
  }
  .modal-title {
    font-size: 20px;
    font-weight: 700;
  }
  .modal-close {
    width: 32px;
    height: 32px;
    border: none;
    background: #f0f0f5;
    border-radius: 50%;
    font-size: 16px;
    color: #8e8e93;
    cursor: pointer;
    -webkit-appearance: none;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* 任务列表 */
  .task-list {
    margin-bottom: 20px;
  }
  .task-item {
    display: flex;
    align-items: center;
    padding: 12px;
    background: #f5f5f7;
    border-radius: 12px;
    margin-bottom: 8px;
  }
  .task-item.disabled {
    opacity: 0.6;
  }
  .task-info {
    flex: 1;
  }
  .task-info .name {
    font-size: 16px;
    font-weight: 500;
  }
  .task-info .time {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 2px;
  }
  .task-actions {
    display: flex;
    gap: 8px;
  }
  .task-action-btn {
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .task-action-btn.toggle {
    background: #e5e5ea;
    color: #666;
  }
  .task-action-btn.edit {
    background: #007aff;
    color: #fff;
  }
  .task-action-btn.delete {
    background: #ff3b30;
    color: #fff;
  }
  .task-action-btn.enable {
    background: #34c759;
    color: #fff;
  }

  /* 任务表单 */
  .task-form {
    padding-top: 16px;
    border-top: 1px solid #e5e5e5;
  }
  .form-group {
    margin-bottom: 16px;
  }
  .form-label {
    display: block;
    font-size: 14px;
    font-weight: 500;
    color: #666;
    margin-bottom: 6px;
  }
  .form-input {
    width: 100%;
    padding: 12px;
    border: 1px solid #e5e5ea;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
    touch-action: auto;
  }
  .form-input:focus {
    border-color: #007aff;
  }
  .form-row {
    display: flex;
    gap: 12px;
  }
  .form-row .form-group {
    flex: 1;
  }
  .form-actions {
    display: flex;
    gap: 12px;
    margin-top: 20px;
  }
  .form-btn {
    flex: 1;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    -webkit-appearance: none;
    touch-action: auto;
  }
  .form-btn.cancel {
    background: #f2f2f7;
    color: #000;
  }
  .form-btn.confirm {
    background: #007aff;
    color: #fff;
  }

  /* 备注弹窗 */
  .note-textarea {
    width: 100%;
    min-height: 100px;
    padding: 12px;
    border: 1px solid #e5e5ea;
    border-radius: 10px;
    font-size: 16px;
    outline: none;
    -webkit-appearance: none;
    resize: none;
    font-family: inherit;
  }
  .note-textarea:focus {
    border-color: #007aff;
  }
  .note-textarea {
    touch-action: auto;
  }

  /* 底部统计 */
  .footer {
    padding: 12px 16px calc(30px + env(safe-area-inset-bottom, 0px));
    padding-bottom: max(30px, calc(30px + env(safe-area-inset-bottom)));
    text-align: center;
    font-size: 13px;
    color: #c7c7cc;
    background: #f2f2f7;
  }

  /* Toast 提示 */
  .toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0,0,0,0.75);
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 14px;
    z-index: 9999;
    opacity: 0;
    transition: opacity .3s;
    pointer-events: none;
  }
  .toast.show {
    opacity: 1;
  }

  /* 确认弹窗 */
  .confirm-modal {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,.5);
    z-index: 9999;
    display: none;
    justify-content: center;
    align-items: center;
  }
  .confirm-modal.show {
    display: flex;
  }
  .confirm-box {
    background: #fff;
    border-radius: 14px;
    padding: 24px 20px;
    width: 280px;
    text-align: center;
  }
  .confirm-box h3 {
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 8px;
  }
  .confirm-box p {
    font-size: 15px;
    color: #666;
    margin-bottom: 20px;
  }
  .confirm-actions {
    display: flex;
    gap: 12px;
  }
  .confirm-btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .confirm-btn.cancel {
    background: #f2f2f7;
    color: #000;
  }
  .confirm-btn.confirm {
    background: #ff3b30;
    color: #fff;
  }
</style>
</head>
<body>

  <div class="navbar">
    <h1 id="pageTitle">待办事项</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="todo">待办</button>
    <button class="tab-btn" data-tab="checkin">打卡</button>
  </div>

  <!-- 待办模块 -->
  <div class="todo-section active" id="todoSection">
    <div class="input-section">
      <div class="input-row">
        <input id="todoInput" type="text" placeholder="添加新待办…">
        <button class="btn-add" onclick="addTodo()">添加</button>
      </div>
    </div>
    <div class="list-section">
      <ul id="todoList"></ul>
    </div>
  </div>

  <!-- 打卡模块 -->
  <div class="checkin-section" id="checkinSection">
    <div class="month-nav">
      <button class="month-nav-btn" onclick="prevMonth()">‹</button>
      <span class="month-nav-title" id="monthTitle"></span>
      <button class="month-nav-btn" onclick="nextMonth()">›</button>
    </div>
    <div class="checkin-table-wrap">
      <table class="checkin-table" id="checkinTable"></table>
    </div>
    <button class="task-manage-btn" onclick="openTaskManager()">+</button>
  </div>

  <div class="footer" id="footer"></div>

  <!-- 任务管理弹窗 -->
  <div class="modal-mask" id="taskModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">打卡任务管理</span>
      </div>
      <div class="task-list" id="taskList"></div>
      <div class="task-form" id="taskForm">
        <div class="form-group">
          <label class="form-label">任务名称</label>
          <input type="text" class="form-input" id="taskNameInput" placeholder="如：晨跑、阅读">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label">开始时间</label>
            <input type="time" class="form-input" id="taskStartTime">
          </div>
          <div class="form-group">
            <label class="form-label">结束时间</label>
            <input type="time" class="form-input" id="taskEndTime">
          </div>
        </div>
      </div>
      <div class="form-actions" style="margin-top:16px;padding-top:16px;border-top:1px solid #e5e5e5;">
        <button class="form-btn confirm" id="saveTaskBtn">保存</button>
        <button class="form-btn cancel" id="closeTaskModalBtn">关闭</button>
      </div>
    </div>
  </div>

  <!-- 备注弹窗 -->
  <div class="modal-mask" id="noteModal">
    <div class="modal-box">
      <div class="modal-header">
        <span class="modal-title">添加备注</span>
        <button class="modal-close" onclick="closeNoteModal()">✕</button>
      </div>
      <textarea class="note-textarea" id="noteInput" placeholder="请输入备注内容…"></textarea>
      <div class="form-actions">
        <button class="form-btn cancel" id="closeNoteModalBtn">取消</button>
        <button class="form-btn confirm" id="saveNoteBtn">保存</button>
      </div>
    </div>
  </div>

  <!-- 确认弹窗 -->
  <div class="confirm-modal" id="confirmModal">
    <div class="confirm-box">
      <h3 id="confirmTitle">确认删除？</h3>
      <p id="confirmText">删除后数据无法恢复</p>
      <div class="confirm-actions">
        <button class="confirm-btn cancel" id="closeConfirmModalBtn">取消</button>
        <button class="confirm-btn confirm" id="confirmBtn">删除</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

<script>
  // ========== 基础工具 ==========
  function showToast(msg, duration) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() {
      toast.classList.remove('show');
    }, duration || 1500);
  }

  function formatDateKey(d) {
    return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
  }

  function parseTime(timeStr) {
    var parts = timeStr.split(':');
    return parseInt(parts[0]) * 60 + parseInt(parts[1]);
  }

  function formatTimeDisplay(timeStr) {
    return timeStr;
  }

  // ========== 待办模块 ==========
  var input = document.getElementById('todoInput');
  var list = document.getElementById('todoList');
  var TODO_KEY = 'todo_apple_v2';

  (function() {
    var d = new Date();
    var week = ['周日','周一','周二','周三','周四','周五','周六'];
    document.getElementById('subtitle').textContent =
      (d.getMonth()+1) + '月' + d.getDate() + '日 ' + week[d.getDay()];
  })();

  function loadTodos() {
    try { return JSON.parse(localStorage.getItem(TODO_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveTodos() {
    var items = [];
    list.querySelectorAll('li').forEach(function(li) {
      var textEl = li.querySelector('.todo-text');
      var text = textEl ? textEl.textContent : '';
      var done = li.classList.contains('done') ? 1 : 0;
      items.push({ text: text, done: done });
    });

  function updateFooter() {

  function escapeHtml(str) {

  var svgEdit = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

  function renderTodo(item) {

  function addTodo() {
    var text = input.value.trim();

  function removeTodo(el) {
    var li = el.closest('li');
    li.querySelector('.swipe-wrap').style.transform = 'translateX(-100%)';
    setTimeout(function() { li.remove(); saveTodos(); }, 200);
  }

  function bindSwipe(li) {
    var wrap = li.querySelector('.swipe-wrap');
    var actions = li.querySelector('.swipe-actions');
    var startX = 0, startY = 0, dx = 0, isOpen = false, isTap = true, hasTouch = false;

    wrap.addEventListener('touchstart', function(e) {
      hasTouch = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dx = 0;
      isTap = true;
      actions.style.transition = 'none';
      closeAllSwipes(li);
    });
    wrap.addEventListener('touchmove', function(e) {
      var moveX = e.touches[0].clientX - startX;
      var moveY = e.touches[0].clientY - startY;
      if (Math.abs(moveX) > 10 || Math.abs(moveY) > 10) isTap = false;
      dx = moveX;
      if (!isOpen && dx < 0) {
        var show = Math.min(Math.abs(dx), 120);
        actions.style.transform = 'translateX(' + (100 - show / 120 * 100) + '%)';
      } else if (isOpen && dx > 0) {
        var hide = Math.min(dx, 120);
        actions.style.transform = 'translateX(' + (hide / 120 * 100) + '%)';
      }
    });
    wrap.addEventListener('touchend', function() {
      actions.style.transition = 'transform .2s ease-out';
      if (isTap && Math.abs(dx) < 10) {
        li.classList.toggle('done');
        saveTodos();
        closeAllSwipes(li);
        return;
      }
      if (dx < -60) {
        actions.style.transform = 'translateX(0)';
        isOpen = true;
        li.classList.add('swiped');
      } else {
        actions.style.transform = 'translateX(100%)';
        isOpen = false;
        li.classList.remove('swiped');
      }
      dx = 0;
    });
    wrap.addEventListener('click', function(e) {
      if (hasTouch) { hasTouch = false; return; }
      li.classList.toggle('done');
      saveTodos();
      closeAllSwipes(li);
    });
  }

  function closeAllSwipes(exceptLi) {
    document.querySelectorAll('li.swiped').forEach(function(li) {
      if (li !== exceptLi) {
        li.classList.remove('swiped');
        var w = li.querySelector('.swipe-wrap');
        if (w) w.style.transform = 'translateX(0)';
        var actions = li.querySelector('.swipe-actions');
        if (actions) actions.style.transform = 'translateX(100%)';
      }
    });
  }

  document.addEventListener('click', function(e) {
    var swipedLi = document.querySelector('li.swiped');
    if (swipedLi && !swipedLi.contains(e.target)) {
      swipedLi.classList.remove('swiped');
      var w = swipedLi.querySelector('.swipe-wrap');
      if (w) w.style.transform = 'translateX(0)';
      var actions = swipedLi.querySelector('.swipe-actions');

    }
  });

  function editTodo(btn) {
    var li = btn.closest('li');
    var textEl = li.querySelector('.todo-text');
    var oldText = textEl.textContent;
    closeAllSwipes(null);
    li.classList.remove('swiped');
    var actions = li.querySelector('.swipe-actions');
    if (actions) actions.style.transform = 'translateX(100%)';

    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'edit-input';
    inp.value = oldText;
    textEl.replaceWith(inp);
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);

    function finish() {
      var v = inp.value.trim();
      var div = document.createElement('div');
      div.className = 'todo-text';
      div.textContent = v || oldText;
      inp.replaceWith(div);
      if (v && v !== oldText) saveTodos();
    }
    inp.addEventListener('blur', finish);
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = oldText; inp.blur(); }
    });
  }

  // ========== 打卡模块 ==========
  var CHECKIN_TASKS_KEY = 'checkin_tasks_v1';
  var CHECKIN_DATA_KEY = 'checkin_data_v1';
  var currentMonth = new Date();
  var editingTaskId = null;
  var currentCellInfo = null; // {taskId, dateKey}
  var confirmCallback = null;

  function loadCheckinTasks() {
    try { return JSON.parse(localStorage.getItem(CHECKIN_TASKS_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveCheckinTasks(tasks) {

  function loadCheckinData() {
    try { return JSON.parse(localStorage.getItem(CHECKIN_DATA_KEY)) || {}; }
    catch(e) { return {}; }
  }

  function saveCheckinData(data) {

  }

  function getDaysInMonth(year, month) {
    return new Date(year, month + 1, 0).getDate();
  }

  function prevMonth() {
    currentMonth.setMonth(currentMonth.getMonth() - 1);
    renderCheckinTable();
  }

  function nextMonth() {
    currentMonth.setMonth(currentMonth.getMonth() + 1);
    renderCheckinTable();
  }

  function renderCheckinTable() {
    var tasks = loadCheckinTasks().filter(function(t) { return t.enabled; });
    var allTasks = loadCheckinTasks();
    var data = loadCheckinData();
    var year = currentMonth.getFullYear();
    var month = currentMonth.getMonth();
    var days = getDaysInMonth(year, month);
    var today = new Date();
    var todayKey = formatDateKey(today);
    var nowMinutes = today.getHours() * 60 + today.getMinutes();

    // 标题
    document.getElementById('monthTitle').textContent = year + '年' + (month + 1) + '月';

    var html = '<thead><tr><th class="task-name">任务</th>';
    for (var d = 1; d <= days; d++) {
      html += '<th>' + d + '</th>';
    }
    html += '</tr></thead><tbody>';

    allTasks.forEach(function(task) {
      if (!task.enabled) return;

      html += '<tr>';
      html += '<td class="task-name"><div class="task-title">' + escapeHtml(task.name) + '</div><div class="time">' + task.startTime + '-' + task.endTime + '</div></td>';

      var startMinutes = parseTime(task.startTime);
      var endMinutes = parseTime(task.endTime);

      for (var d = 1; d <= days; d++) {
        var cellDate = new Date(year, month, d);
        var dateKey = formatDateKey(cellDate);
        var key = task.id + '_' + dateKey;
        var record = data[key];
        var cellClass = 'cell';

        // 判断日期状态
        var isFuture = dateKey > todayKey;
        var isToday = dateKey === todayKey;
        var daysDiff = Math.floor((today - cellDate) / (1000 * 60 * 60 * 24));
        var isTooOld = daysDiff > 1;

        // 判断时间窗口
        var windowStart = startMinutes - 60; // 提前1小时
        var windowEnd = endMinutes + 60; // 超时1小时
        var inTimeWindow = isToday && nowMinutes >= windowStart && nowMinutes <= windowEnd;
        var isTimePassed = isToday && nowMinutes > windowEnd;

        if (record && record.checked) {
          cellClass += ' checked';
          html += '<td class="' + cellClass + '" data-task="' + task.id + '" data-date="' + dateKey + '">✓</td>';
        } else if (record && record.note) {
          cellClass += ' has-note';
          html += '<td class="' + cellClass + '" data-task="' + task.id + '" data-date="' + dateKey + '" title="' + escapeHtml(record.note) + '">📝</td>';
        } else if (isFuture) {
          cellClass += ' future';
          html += '<td class="' + cellClass + '"></td>';
        } else if (isTooOld) {
          cellClass += ' past overdue';
          html += '<td class="' + cellClass + '">-</td>';
        } else if (isToday && !inTimeWindow && !isTimePassed) {
          // 今天但不在时间窗口内，未到时间
          html += '<td class="' + cellClass + '"></td>';
        } else if (isToday && isTimePassed) {
          // 今天时间已过，可以备注
          html += '<td class="' + cellClass + '" data-task="' + task.id + '" data-date="' + dateKey + '"></td>';
        } else if (inTimeWindow) {
          // 在时间窗口内，可以打卡
          html += '<td class="' + cellClass + '" data-task="' + task.id + '" data-date="' + dateKey + '"></td>';
        } else {
          // 历史日期（昨天），可以备注
          html += '<td class="' + cellClass + '" data-task="' + task.id + '" data-date="' + dateKey + '"></td>';
        }
      }
      html += '</tr>';
    });

    // 停用的任务
    var disabledTasks = allTasks.filter(function(t) { return !t.enabled; });
    if (disabledTasks.length > 0) {
      html += '<tr style="background:#f9f9f9;"><td colspan="' + (days + 1) + '" style="text-align:left;padding:12px;color:#8e8e93;font-size:12px;">已停用的任务</td></tr>';
      disabledTasks.forEach(function(task) {
        html += '<tr>';
        html += '<td class="task-name" style="opacity:0.5;background:#fff;"><div class="task-title">' + escapeHtml(task.name) + '<span class="status-tag disabled">已停用</span></div><div class="time">' + task.startTime + '-' + task.endTime + '</div></td>';
        for (var d = 1; d <= days; d++) {
          html += '<td class="cell disabled-task"></td>';
        }
        html += '</tr>';
      });
    }

    html += '</tbody>';
    document.getElementById('checkinTable').innerHTML = html;

    // 绑定点击事件 - 单击打卡，双击备注
    bindCellEvents();
  }

  // 全局变量用于单击/双击检测
  var cellLastTap = 0;
  var cellTapTimer = null;

  // 绑定单元格事件
  function bindCellEvents() {
    document.querySelectorAll('.checkin-table td.cell[data-task]').forEach(function(cell) {
      // 触摸事件处理
      cell.addEventListener('touchend', function(e) {
        e.preventDefault();
        var now = Date.now();

        if (now - cellLastTap < 300) {
          // 双击
          if (cellTapTimer) {
            clearTimeout(cellTapTimer);
            cellTapTimer = null;
          }
          handleCellNote(this);
          cellLastTap = 0;
        } else {
          cellLastTap = now;
          var self = this;
          cellTapTimer = setTimeout(function() {
            handleCellCheck(self);
            cellTapTimer = null;
          }, 300);
        }
      });

      // 桌面点击处理
      cell.addEventListener('click', function(e) {
        var now = Date.now();

        if (now - cellLastTap < 300) {
          if (cellTapTimer) {
            clearTimeout(cellTapTimer);
            cellTapTimer = null;
          }
          handleCellNote(this);
          cellLastTap = 0;
        } else {
          cellLastTap = now;
          var self = this;
          cellTapTimer = setTimeout(function() {
            handleCellCheck(self);
            cellTapTimer = null;
          }, 300);
        }
      });
    });
  }

  // 单击打卡
  function handleCellCheck(cell) {
    var taskId = cell.dataset.task;
    var dateKey = cell.dataset.date;
    var tasks = loadCheckinTasks();
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (!task || !task.enabled) return;

    var data = loadCheckinData();
    var key = taskId + '_' + dateKey;
    var record = data[key] || {};

    var today = new Date();
    var todayKey = formatDateKey(today);
    var cellDate = new Date(dateKey);
    var daysDiff = Math.floor((today - cellDate) / (1000 * 60 * 60 * 24));

    // 判断是否可编辑（只能操作昨天和今天）
    var canEdit = daysDiff <= 1;

    // 未来日期
    if (dateKey > todayKey) {
      showToast('无法操作未来日期');
      return;
    }

    // 超过1天（前天及更早）
    if (daysDiff > 1) {
      showToast('只能操作昨天和今天的记录');
      return;
    }

    var nowMinutes = today.getHours() * 60 + today.getMinutes();
    var startMinutes = parseTime(task.startTime);
    var endMinutes = parseTime(task.endTime);
    var windowStart = startMinutes - 60;
    var windowEnd = endMinutes + 60;
    var isToday = dateKey === todayKey;

    // 已打卡
    if (record.checked) {
      if (canEdit) {
        // 取消打卡
        delete data[key];
        saveCheckinData(data);
        renderCheckinTable();
        showToast('已取消打卡');
      } else {
        showToast('已超过可操作时间');
      }
      return;
    }

    // 已有备注
    if (record.note) {
      showToast('已有备注：' + record.note);
      return;
    }

    // 在时间窗口内，可以打卡
    if (isToday && nowMinutes >= windowStart && nowMinutes <= windowEnd) {
      data[key] = { checked: true };
      saveCheckinData(data);
      renderCheckinTable();
      showToast('打卡成功！');
      return;
    }

    // 时间已过或非今天
    if (!isToday || nowMinutes > windowEnd) {
      showToast('已超时，双击添加备注');
      return;
    }

    // 未到时间
    showToast('未到打卡时间');
  }

  // 双击备注
  function handleCellNote(cell) {
    var taskId = cell.dataset.task;
    var dateKey = cell.dataset.date;
    var tasks = loadCheckinTasks();
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (!task || !task.enabled) return;

    var today = new Date();
    var cellDate = new Date(dateKey);
    var daysDiff = Math.floor((today - cellDate) / (1000 * 60 * 60 * 24));
    var todayKey = formatDateKey(today);

    // 未来日期
    if (dateKey > todayKey) {
      showToast('无法操作未来日期');
      return;
    }

    // 超过1天（前天及更早）
    if (daysDiff > 1) {
      showToast('只能操作昨天和今天的记录');
      return;
    }

    var data = loadCheckinData();
    var key = taskId + '_' + dateKey;
    var record = data[key] || {};

    // 打开备注弹窗
    currentCellInfo = { taskId: taskId, dateKey: dateKey };
    document.getElementById('noteInput').value = record.note || '';
    document.getElementById('noteModal').classList.add('show');
  }

  // ========== 任务管理 ==========
  function openTaskManager() {
    editingTaskId = null;
    resetTaskForm();
    renderTaskList();
    document.getElementById('taskModal').classList.add('show');
  }

  function closeTaskModal() {
    document.getElementById('taskModal').classList.remove('show');
    editingTaskId = null;
    resetTaskForm();
  }

  function resetTaskForm() {
    document.getElementById('taskNameInput').value = '';
    document.getElementById('taskStartTime').value = '08:00';
    document.getElementById('taskEndTime').value = '09:00';
    editingTaskId = null;
    isEditingTask = false; // 重置编辑标记
  }

  // 开始时间变化时自动更新结束时间
  var isEditingTask = false; // 用于跟踪是否正在编辑任务
  document.getElementById('taskStartTime').addEventListener('change', function() {
    // 只有在新增任务时才自动调整结束时间
    if (!editingTaskId && !isEditingTask) {
      var val = this.value;
      if (!val || val.indexOf(':') === -1) return;
      var startParts = val.split(':');
      var startHour = parseInt(startParts[0], 10);
      var startMin = parseInt(startParts[1], 10);
      if (isNaN(startHour) || isNaN(startMin)) return;
      var endHour = startHour + 1;
      var endMin = startMin;
      if (endHour >= 24) {
        endHour = 23;
        endMin = 59;
      }
      document.getElementById('taskEndTime').value = ('0' + endHour).slice(-2) + ':' + ('0' + endMin).slice(-2);
    }
  });

  function renderTaskList() {
    var tasks = loadCheckinTasks();
    var html = '';
    tasks.forEach(function(task) {
      html += '<div class="task-item' + (task.enabled ? '' : ' disabled') + '" data-task-id="' + task.id + '">';
      html += '<div class="task-info">';
      html += '<div class="name">' + escapeHtml(task.name) + '</div>';
      html += '<div class="time">' + task.startTime + ' - ' + task.endTime + '</div>';
      html += '</div>';
      html += '<div class="task-actions">';
      if (task.enabled) {
        html += '<button class="task-action-btn toggle" data-action="toggle">停用</button>';
      } else {
        html += '<button class="task-action-btn enable" data-action="toggle">启用</button>';
      }
      html += '<button class="task-action-btn edit" data-action="edit">编辑</button>';
      html += '<button class="task-action-btn delete" data-action="delete">删除</button>';
      html += '</div>';
      html += '</div>';
    });
    document.getElementById('taskList').innerHTML = html || '<p style="text-align:center;color:#8e8e93;padding:20px;">暂无打卡任务</p>';

    // 绑定任务项按钮事件
    document.querySelectorAll('.task-item').forEach(function(item) {
      var taskId = item.dataset.taskId;
      item.querySelectorAll('.task-action-btn').forEach(function(btn) {
        btn.addEventListener('click', function(e) {
          e.preventDefault();
          e.stopPropagation();
          var action = this.dataset.action;
          if (action === 'toggle') toggleTask(taskId);
          else if (action === 'edit') editTask(taskId);
          else if (action === 'delete') deleteTask(taskId);
        });
      });
    });
  }

  function toggleTask(taskId) {
    var tasks = loadCheckinTasks();
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (task) {
      task.enabled = !task.enabled;
      saveCheckinTasks(tasks);
      renderTaskList();
      renderCheckinTable();
    }
  }

  function editTask(taskId) {
    var tasks = loadCheckinTasks();
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (task) {
      editingTaskId = taskId;
      isEditingTask = true; // 标记正在编辑
      document.getElementById('taskNameInput').value = task.name;
      document.getElementById('taskStartTime').value = task.startTime;
      document.getElementById('taskEndTime').value = task.endTime;
    }
  }

  function deleteTask(taskId) {
    var tasks = loadCheckinTasks();
    var task = tasks.find(function(t) { return t.id === taskId; });
    if (task) {
      confirmCallback = function() {
        tasks = tasks.filter(function(t) { return t.id !== taskId; });
        saveCheckinTasks(tasks);
        renderTaskList();
        renderCheckinTable();
      };
      document.getElementById('confirmTitle').textContent = '确认删除？';
      document.getElementById('confirmText').textContent = '删除任务"' + task.name + '"后，相关打卡记录也会被清除';
      document.getElementById('confirmModal').classList.add('show');
    }
  }

  function saveTask() {
    var name = document.getElementById('taskNameInput').value.trim();
    var startTime = document.getElementById('taskStartTime').value;
    var endTime = document.getElementById('taskEndTime').value;

    if (!name) {
      showToast('请输入任务名称');
      return;
    }
    if (!startTime || !endTime) {
      showToast('请选择时间段');
      return;
    }
    if (startTime >= endTime) {
      showToast('结束时间必须大于开始时间');
      return;
    }

    var tasks = loadCheckinTasks();

    if (editingTaskId) {
      var task = tasks.find(function(t) { return t.id === editingTaskId; });
      if (task) {
        task.name = name;
        task.startTime = startTime;
        task.endTime = endTime;
      }
    } else {
      tasks.push({
        id: 'task_' + Date.now(),
        name: name,
        startTime: startTime,
        endTime: endTime,
        enabled: true
      });
    }

    saveCheckinTasks(tasks);
    resetTaskForm();
    editingTaskId = null;
    renderTaskList();
    renderCheckinTable();
    showToast('保存成功');
  }

  function cancelTaskForm() {
    resetTaskForm();
    editingTaskId = null;
  }

  // ========== 备注相关 ==========
  function closeNoteModal() {
    document.getElementById('noteModal').classList.remove('show');
    currentCellInfo = null;
  }

  function saveNote() {
    if (!currentCellInfo) return;
    var note = document.getElementById('noteInput').value.trim();
    var data = loadCheckinData();
    var key = currentCellInfo.taskId + '_' + currentCellInfo.dateKey;
    var existing = data[key] || {};

    if (note) {
      data[key] = { checked: existing.checked, note: note };
      saveCheckinData(data);
      renderCheckinTable();
      showToast('备注已保存');
    } else if (existing.checked) {
      // 如果清空备注但有打卡，保留打卡
      data[key] = { checked: true };
      saveCheckinData(data);
      renderCheckinTable();
    } else {
      // 完全清空
      delete data[key];
      saveCheckinData(data);
      renderCheckinTable();
    }
    closeNoteModal();
  }

  // ========== 确认弹窗 ==========
  function closeConfirmModal() {
    document.getElementById('confirmModal').classList.remove('show');
    confirmCallback = null;
  }

  function confirmAction() {
    if (confirmCallback) {
      confirmCallback();
    }
    closeConfirmModal();
  }

  // ========== iOS 优化 ==========
  // 移除全局 touchend 阻止，改用 CSS touch-action: manipulation 来禁止双击缩放

  document.addEventListener('touchmove', function() {}, { passive: true });

  // 注册 Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }

  // 任务管理弹窗按钮事件绑定
  document.getElementById('saveTaskBtn').addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    saveTask();
  });

  document.getElementById('closeTaskModalBtn').addEventListener('click', function(e) {
    e.preventDefault();
    e.stopPropagation();
    closeTaskModal();
  });

  // 阻止弹窗内表单的默认行为
  document.getElementById('taskForm').addEventListener('submit', function(e) {
    e.preventDefault();
  });

  // iOS 时间选择器保护：阻止事件冒泡导致弹窗状态异常
  document.getElementById('taskStartTime').addEventListener('focus', function(e) {
    e.stopPropagation();
  });
  document.getElementById('taskStartTime').addEventListener('blur', function(e) {
    e.stopPropagation();
  });
  document.getElementById('taskEndTime').addEventListener('focus', function(e) {
    e.stopPropagation();
  });
  document.getElementById('taskEndTime').addEventListener('blur', function(e) {
    e.stopPropagation();
  });

  // 阻止时间选择器的触摸/点击事件冒泡到 mask 层
  document.getElementById('taskStartTime').addEventListener('touchstart', function(e) {
    e.stopPropagation();
  });
  document.getElementById('taskEndTime').addEventListener('touchstart', function(e) {
    e.stopPropagation();
  });

  // 确保 modal-box 内的点击不会关闭弹窗
  document.querySelector('#taskModal .modal-box').addEventListener('click', function(e) {
    e.stopPropagation();
  });

  // 点击 mask 层关闭弹窗（可选，如果不需要可以删除）
  document.getElementById('taskModal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeTaskModal();
    }
  });

  // 备注弹窗按钮事件绑定
  document.getElementById('closeNoteModalBtn').addEventListener('click', function(e) {
    e.preventDefault();
    closeNoteModal();
  });

  document.getElementById('saveNoteBtn').addEventListener('click', function(e) {
    e.preventDefault();
    saveNote();
  });

  // 备注弹窗保护
  document.querySelector('#noteModal .modal-box').addEventListener('click', function(e) {
    e.stopPropagation();
  });
  document.getElementById('noteModal').addEventListener('click', function(e) {
    if (e.target === this) {
      closeNoteModal();
    }
  });
  document.getElementById('noteInput').addEventListener('focus', function(e) {
    e.stopPropagation();
  });
  document.getElementById('noteInput').addEventListener('blur', function(e) {
    e.stopPropagation();
  });
  document.getElementById('noteInput').addEventListener('touchstart', function(e) {
    e.stopPropagation();
  });

  // 确认弹窗按钮事件绑定
  document.getElementById('closeConfirmModalBtn').addEventListener('click', function(e) {
    e.preventDefault();
    closeConfirmModal();
  });

  document.getElementById('confirmBtn').addEventListener('click', function(e) {
    e.preventDefault();
    confirmAction();
  });
</script>
</body>
</html>
