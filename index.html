<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="待办">
<meta name="format-detection" content="telephone=no">
<meta name="theme-color" content="#667eea">
<link rel="apple-touch-icon" href="icon-180.png?v=2">
<link rel="icon" type="image/png" sizes="180x180" href="icon-180.png?v=2">
<link rel="manifest" href="manifest.json">
<title>待办事项</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
    background: #f2f2f7;
    color: #000;
    min-height: 100vh;
    min-height: -webkit-fill-available;
    -webkit-text-size-adjust: 100%;
    overscroll-behavior: none;
  }

  /* 顶部导航 */
  .navbar {
    padding: env(safe-area-inset-top, 20px) 16px 12px;
    padding-top: max(env(safe-area-inset-top), 50px);
    background: #fff;
    border-bottom: 1px solid #e5e5e5;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .navbar h1 {
    font-size: 32px;
    font-weight: 700;
  }
  .navbar .subtitle {
    font-size: 13px;
    color: #8e8e93;
    margin-top: 2px;
  }

  /* 输入区 */
  .input-section {
    padding: 12px 16px;
    border-bottom: 1px solid #e5e5e5;
    background: #fff;
  }
  .input-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .input-row input[type="text"] {
    flex: 1;
    padding: 10px 0;
    border: none;
    font-size: 17px;
    outline: none;
    -webkit-appearance: none;
    background: transparent;
  }
  .input-row input[type="text"]::placeholder {
    color: #c7c7cc;
  }
  .btn-add {
    padding: 8px 14px;
    background: #ffc107;
    color: #000;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    -webkit-appearance: none;
  }
  .btn-add:active { opacity: .7; }

  /* 列表 */
  .list-section {
    overflow: hidden;
    background: #fff;
    margin: 12px 0;
    border-radius: 12px;
    margin-left: 12px;
    margin-right: 12px;
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: #c7c7cc;
    font-size: 15px;
  }
  ul { list-style: none; }
  li {
    border-bottom: 1px solid #e5e5e5;
    position: relative;
    overflow: hidden;
    padding: 0 16px;
  }
  li:last-child { border-bottom: none; }

  /* 滑动容器 */
  .swipe-wrap {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    background: transparent;
    transition: transform .2s ease-out;
    touch-action: pan-y;
    position: relative;
    z-index: 2;
  }
  li .swipe-wrap {
    background: #fff;
    margin: 0 -16px;
    padding: 12px 16px;
    position: relative;
    z-index: 2;
  }
  li.done .swipe-wrap { background: #e8f5e9; }

  /* 滑动操作区 */
  .swipe-actions {
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    display: flex;
    z-index: 3;
    transform: translateX(100%);
    transition: transform .2s ease-out;
  }
  li.swiped .swipe-actions {
    transform: translateX(0);
  }
  .swipe-btn {
    width: 60px;
    border: none;
    color: #fff;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    -webkit-appearance: none;
  }
  .swipe-btn svg { width: 18px; height: 18px; }
  .btn-edit { background: #007aff; }
  .btn-delete { background: #ff3b30; }

  /* Checkbox */
  .check-btn {
    width: 22px;
    height: 22px;
    border: 2px solid #c7c7cc;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    -webkit-appearance: none;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all .2s;
  }
  .check-btn:active { transform: scale(.9); }
  li.done .check-btn {
    background: #34c759;
    border-color: #34c759;
  }
  li.done .check-btn::after {
    content: '';
    width: 6px;
    height: 10px;
    border: 2px solid #fff;
    border-top: none;
    border-left: none;
    transform: rotate(45deg) translateY(-1px);
  }
  li.done { background: #e8f5e9; }
  li.done .swipe-wrap { background: #e8f5e9; }
  li.done .todo-text {
    color: #2e7d32;
  }

  /* 内容 */
  .todo-content { flex: 1; min-width: 0; }
  .todo-text {
    font-size: 17px;
    line-height: 1.4;
    word-break: break-word;
  }

  /* 编辑状态 */
  .edit-input {
    width: 100%;
    padding: 0;
    border: none;
    font-size: 17px;
    outline: none;
    -webkit-appearance: none;
    background: transparent;
  }

  /* 底部统计 */
  .footer {
    padding: 12px 16px calc(30px + env(safe-area-inset-bottom, 0px));
    padding-bottom: max(30px, calc(30px + env(safe-area-inset-bottom)));
    text-align: center;
    font-size: 13px;
    color: #c7c7cc;
    background: #f2f2f7;
  }

  /* iOS输入框优化 */
  input, button, select, textarea {
    -webkit-appearance: none;
    border-radius: 0;
  }
  input:focus, textarea:focus, select:focus {
    outline: none;
  }
  input[type="text"] {
    -webkit-border-radius: 0;
  }
</style>
</head>
<body>

  <div class="navbar">
    <h1>待办事项</h1>
    <div class="subtitle" id="subtitle"></div>
  </div>

  <div class="input-section">
    <div class="input-row">
      <input id="todoInput" type="text" placeholder="添加新待办…">
      <button class="btn-add" onclick="addTodo()">添加</button>
    </div>
  </div>

  <div class="list-section">
    <ul id="todoList"></ul>
  </div>

  <div class="footer" id="footer"></div>

<script>
  var input = document.getElementById('todoInput');
  var list = document.getElementById('todoList');
  var STORAGE_KEY = 'todo_apple_v2';

  // 日期显示
  (function() {
    var d = new Date();
    var week = ['周日','周一','周二','周三','周四','周五','周六'];
    document.getElementById('subtitle').textContent =
      (d.getMonth()+1) + '月' + d.getDate() + '日 ' + week[d.getDay()];
  })();

  function loadTodos() {
    try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
    catch(e) { return []; }
  }

  function saveTodos() {
    var items = [];
    list.querySelectorAll('li').forEach(function(li) {
      var textEl = li.querySelector('.todo-text');
      var text = textEl ? textEl.textContent : '';
      var done = li.classList.contains('done') ? 1 : 0;
      items.push({ text: text, done: done });
    });
    localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
    updateFooter();
  }

  function updateFooter() {
    var total = list.querySelectorAll('li').length;
    var done = list.querySelectorAll('li.done').length;
    document.getElementById('footer').textContent =
      total ? (done + '/' + total + ' 已完成') : '';
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  var svgEdit = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>';

  function renderTodo(item) {
    var li = document.createElement('li');
    if (item.done) li.classList.add('done');

    li.innerHTML =
      '<div class="swipe-wrap" data-x="0">' +
        '<div class="todo-content">' +
          '<div class="todo-text">' + escapeHtml(item.text) + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="swipe-actions">' +
        '<button class="swipe-btn btn-edit" onclick="event.stopPropagation();editTodo(this)">' + svgEdit + '</button>' +
        '<button class="swipe-btn btn-delete" onclick="event.stopPropagation();removeTodo(this)">删除</button>' +
      '</div>';
    list.appendChild(li);
    bindSwipe(li);
  }

  function addTodo() {
    var text = input.value.trim();
    if (!text) return;

    renderTodo({ text: text, done: 0 });
    saveTodos();
    input.value = '';
    input.blur();
  }

  function removeTodo(el) {
    var li = el.closest('li');
    li.querySelector('.swipe-wrap').style.transform = 'translateX(-100%)';
    setTimeout(function() { li.remove(); saveTodos(); }, 200);
  }

  // 左滑显示操作
  function bindSwipe(li) {
    var wrap = li.querySelector('.swipe-wrap');
    var actions = li.querySelector('.swipe-actions');
    var startX = 0, startY = 0, dx = 0, isOpen = false, isTap = true, hasTouch = false;

    wrap.addEventListener('touchstart', function(e) {
      hasTouch = true;
      startX = e.touches[0].clientX;
      startY = e.touches[0].clientY;
      dx = 0;
      isTap = true;
      actions.style.transition = 'none';
      closeAllSwipes(li);
    });
    wrap.addEventListener('touchmove', function(e) {
      var moveX = e.touches[0].clientX - startX;
      var moveY = e.touches[0].clientY - startY;
      if (Math.abs(moveX) > 10 || Math.abs(moveY) > 10) isTap = false;
      dx = moveX;
      if (!isOpen && dx < 0) {
        var show = Math.min(Math.abs(dx), 120);
        actions.style.transform = 'translateX(' + (100 - show / 120 * 100) + '%)';
      } else if (isOpen && dx > 0) {
        var hide = Math.min(dx, 120);
        actions.style.transform = 'translateX(' + (hide / 120 * 100) + '%)';
      }
    });
    wrap.addEventListener('touchend', function() {
      actions.style.transition = 'transform .2s ease-out';
      if (isTap && Math.abs(dx) < 10) {
        li.classList.toggle('done');
        saveTodos();
        closeAllSwipes(li);
        return;
      }
      if (dx < -60) {
        actions.style.transform = 'translateX(0)';
        isOpen = true;
        li.classList.add('swiped');
      } else {
        actions.style.transform = 'translateX(100%)';
        isOpen = false;
        li.classList.remove('swiped');
      }
      dx = 0;
    });
    wrap.addEventListener('click', function(e) {
      if (hasTouch) { hasTouch = false; return; }
      li.classList.toggle('done');
      saveTodos();
      closeAllSwipes(li);
    });
  }

  function closeAllSwipes(exceptLi) {
    document.querySelectorAll('li.swiped').forEach(function(li) {
      if (li !== exceptLi) {
        li.classList.remove('swiped');
        var w = li.querySelector('.swipe-wrap');
        if (w) w.style.transform = 'translateX(0)';
        var actions = li.querySelector('.swipe-actions');
        if (actions) actions.style.transform = 'translateX(100%)';
      }
    });
  }

  document.addEventListener('click', function(e) {
    var swipedLi = document.querySelector('li.swiped');
    if (swipedLi && !swipedLi.contains(e.target)) {
      swipedLi.classList.remove('swiped');
      var w = swipedLi.querySelector('.swipe-wrap');
      if (w) w.style.transform = 'translateX(0)';
      var actions = swipedLi.querySelector('.swipe-actions');
      if (actions) actions.style.transform = 'translateX(100%)';
    }
  });

  function editTodo(btn) {
    var li = btn.closest('li');
    var textEl = li.querySelector('.todo-text');
    var oldText = textEl.textContent;

    closeAllSwipes(null);
    li.classList.remove('swiped');
    var actions = li.querySelector('.swipe-actions');
    if (actions) actions.style.transform = 'translateX(100%)';

    var inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'edit-input';
    inp.value = oldText;
    textEl.replaceWith(inp);
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);

    function finish() {
      var v = inp.value.trim();
      var div = document.createElement('div');
      div.className = 'todo-text';
      div.textContent = v || oldText;
      inp.replaceWith(div);
      if (v && v !== oldText) saveTodos();
    }
    inp.addEventListener('blur', finish);
    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') inp.blur();
      if (e.key === 'Escape') { inp.value = oldText; inp.blur(); }
    });
  }

  // 加载
  loadTodos().forEach(function(item) {
    if (typeof item === 'string') renderTodo({ text: item, done: 0 });
    else renderTodo({ text: item.text, done: item.done || 0 });
  });
  updateFooter();

  input.addEventListener('keydown', function(e) { if (e.key === 'Enter') addTodo(); });

  // iOS防止双击缩放
  document.addEventListener('touchend', function(e) {
    var now = Date.now();
    if (now - (this.lastTouch || 0) < 300) {
      e.preventDefault();
    }
    this.lastTouch = now;
  }, { passive: false });

  document.addEventListener('touchmove', function() {}, { passive: true });

  // 注册Service Worker
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }
</script>
</body>
</html>
